<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Delicious Recipes</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">Delicious Recipes</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#featured">Categories</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-banner">
            <h1>Let's Connect</h1>
            <p>Have a suggestion, a recipe request, or just want to say hi? I'd love to hear from you.</p>
        </div>

        <section class="recipe-content">
            <form class="contact-form">
                <div class="form-group">
                    <label style="display:block; margin-bottom: 8px; font-size: 14px; color: #888;">Full Name</label>
                    <input type="text" placeholder="e.g. Akshay Yadav" required>
                </div>
                
                <div class="form-group">
                    <label style="display:block; margin-bottom: 8px; font-size: 14px; color: #888;">Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label style="display:block; margin-bottom: 8px; font-size: 14px; color: #888;">Message</label>
                    <textarea placeholder="Tell me what's on your mind..." rows="6" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>

        <footer>
            <p>Created by Akshay Yadav | BTech Semester 2</p>
        </footer>
    </main>

</body>
</html>
